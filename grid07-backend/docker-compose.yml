version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: grid07_postgres
    environment:
      POSTGRES_DB: grid07db
      POSTGRES_USER: grid07
      POSTGRES_PASSWORD: grid07pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: grid07_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    # no password for local dev - fine for testing

volumes:
  postgres_data:
